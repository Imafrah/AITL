services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aitl_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./sample_data:/app/sample_data
      - ./output:/app/output
      - ./schema_memory.db:/app/schema_memory.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aitl_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
